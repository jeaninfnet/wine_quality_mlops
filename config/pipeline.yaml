pipeline:
  name: "wine-quality-opinion-pipeline"
  version: "1.0.0"
  description: "Ingestão e modelagem — opinião de qualidade (vinho branco)"

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  output_filename: "winequality_raw.parquet"
  features_data_dir: "data/features"
  features_filename: "wine_white_opinion.parquet"

execution:
  skip_download_if_exists: true
  skip_ingest_if_exists: true
  force_redownload: false
  force_ingest: false

logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s - %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"
  log_to_file: false
  log_file: "pipeline.log"
