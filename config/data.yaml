# Fonte: mesmo dataset do Projeto 1 (Kaggle) — rajyellow46/wine-quality
kaggle:
  dataset: "rajyellow46/wine-quality"
  file_pattern: "*.csv"
  expected_files:
    - "winequalityN.csv"
  expected_count: 1

ingest:
  output_format: "parquet"
  compression: "snappy"
  chunk_size_rows: 100000
  convert_dtypes: true
  validate_schema: true

# Nomes após normalização na ingestão (snake_case)
schema:
  required_columns:
    - "type"
    - "fixed_acidity"
    - "volatile_acidity"
    - "citric_acid"
    - "residual_sugar"
    - "chlorides"
    - "free_sulfur_dioxide"
    - "total_sulfur_dioxide"
    - "density"
    - "ph"
    - "sulphates"
    - "alcohol"
    - "quality"
